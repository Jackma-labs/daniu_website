version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: daniu-web:latest
    container_name: daniu-web
    restart: unless-stopped
    env_file:
      - /etc/daniu/daniu.env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DANIU_STORAGE_DIR: /data/daniu
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /data/daniu:/data/daniu
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
